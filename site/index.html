<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eu te amo</title>
  
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }
    
    #love {
        background-color: #fd0d0d;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        width: 200px; 
        display: flex;
        justify-content: space-around;
        color: #530202;
    }

    button {
        width: 60px;
        height: 40px;
        margin: 5px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        background-color: #ff7979;
        color: #530202; 
        cursor: pointer;
        transition: background 0.2s;
        ;
    }

    button:hover {
        background-color: #f4c8c8;
    }

</style>
</head>
<body>
    
<div id="love">
 <span id="perg"> você me ama?</span>   
    <br>
    <button id="sim" onclick="sim()">sim</button>
    
    <button id="nao" onclick="nao()">não</button>
</div>
<div id="result"></div>

<script>
let qdr = document.getElementById('love');
let simBtn = document.getElementById('sim');
let naoBtn = document.getElementById('nao');
let result = document.getElementById('result');
let pergunta = document.getElementById('perg');
let
clicsim = 0;
clicnao = 0;

function sim() {
    qdr.style.backgroundColor = '#fd0d0d';
    simBtn.style.backgroundColor = '#ff7979';
    naoBtn.style.backgroundColor = '#ff7979';
    clicsim++;
    if (clicsim >= 1) {
        pergunta.innerText = 'concorda com isso né?'
            alert('eu amo mais');
    } if (clicsim >= 2){
        qdr.innerText = 'é a verdade, e nada vai mudar isso';
        result.innerText = 'fort abraço, minha princesa';
    }

}
function nao() {
    qdr.style.backgroundColor = '#000000';
    simBtn.style.backgroundColor = '#ff7979';
    naoBtn.style.backgroundColor = '#ff7979';
    qdr.style.color = '#ffffff';
    
    alert('resposta inválida');
    clicnao++;
    if (clicnao >= 3) {
        naoBtn.style.display = 'none';
        alert('vai ficar instindo mesmo?');
    }
}



</script>

</body>
</html>

    document.addEventListener('DOMContentLoaded', function () {
      const navContainer = document.getElementById('category-nav');
      const sectionsContainer = document.getElementById('menu-sections');

      cardapioData.forEach((categoria, index) => {
        const catId = `cat-${index}`;

        // Nav link
        const link = document.createElement('a');
        link.href = `#${catId}`;
        link.innerText = categoria.titulo;
        link.className = 'category-link';
        navContainer.appendChild(link);

        // Section
        const section = document.createElement('section');
        section.id = catId;

        let headerExtra = '';
        if (categoria.delivery) {
          headerExtra = `<span class="badge-delivery ml-3">Só Delivery</span>`;
        }

        section.innerHTML = `<h2 class="text-3xl font-serif text-amber-900 mb-8 border-b pb-4 flex items-center">${categoria.titulo}${headerExtra}</h2>`;

        const grid = document.createElement('div');
        grid.className = 'grid gap-6';

        categoria.itens.forEach(item => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'flex justify-between items-start group border-b border-stone-100 pb-5';

          let badges = '';
          if (item.destaque) badges += `<span class="badge-destaque mr-2">Destaque</span>`;
          if (item.delivery) badges += `<span class="badge-delivery mr-2">Só Delivery</span>`;
          if (item.encomenda) badges += `<span class="badge-encomenda mr-2">Encomenda</span>`;

          itemDiv.innerHTML = `
            <div class="flex-1 pr-4">
              ${badges ? `<div class="mb-2">${badges}</div>` : ''}
              <div class="flex justify-between items-baseline mb-1 gap-4">
                <h4 class="text-base font-semibold group-hover:text-amber-700 transition leading-snug">${item.nome}</h4>
                <span class="font-bold text-amber-800 whitespace-nowrap text-sm">${item.preco}</span>
              </div>
              ${item.desc ? `<p class="text-stone-500 text-sm italic">${item.desc}</p>` : ''}
            </div>
          `;
          grid.appendChild(itemDiv);
        });

        section.appendChild(grid);
        sectionsContainer.appendChild(section);
      });

      // Intersection Observer para highlight do menu lateral
      const sections = document.querySelectorAll('#menu-sections section');
      const links = document.querySelectorAll('.category-link');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            links.forEach(l => l.classList.remove('active'));
            const active = document.querySelector(`a[href="#${entry.target.id}"]`);
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });

      sections.forEach(s => observer.observe(s));
    });
    </script>

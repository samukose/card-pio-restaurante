<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #square {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 100px auto;
            font-style: italic;
            font-display: auto;
            font-size: 20px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="square"> square</div>

    <script>
        var square = document.getElementById('square');

        square.addEventListener('click', function() {
            if (square.style.backgroundColor === 'blue') {
                square.style.backgroundColor = 'red';
                square.innerText = 'red';
                backgroundColor = 'dark red'
            } else {
                square.style.backgroundColor = 'blue';
                square.innerText = 'square';
            }
        });

        square.addEventListener('mouseover', function(){
          if (square.style.backgroundColor === 'blue' || square.style.backgroundColor === 'red') {
            square.style.backgroundColor = 'orange';
            square.innerText = 'orange';
            backgroundColor = 'dark orange'
          }
        });

        square.addEventListener('mouseout', function(){
          if (square.style.backgroundColor === 'orange') {
            square.style.backgroundColor = 'blue';
            square.innerText = 'square';
             } 
            });
    </script>
</body>
</html>
